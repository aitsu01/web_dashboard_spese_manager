<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Spese Personali</title>

  <!-- Bootstrap 5.3 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- CSS personalizzato -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="py-4 shadow-sm bg-primary text-white">
    <div class="container">
      <h1 class="mb-1">Dashboard Spese Personali</h1>
      <p class="mb-0">Gestisci, modifica e monitora le tue spese in modo semplice</p>
    </div>
  </header>

  <main class="container my-5">

    <!-- Sezione form inserimento -->
    <section class="mb-5">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h2 class="h4 mb-4">Aggiungi una nuova spesa</h2>

          <form id="expense-form" novalidate>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="description" class="form-label">Descrizione</label>
                <input
                  type="text"
                  class="form-control"
                  id="description"
                  placeholder="Es. Spesa supermercato"
                  required
                >
              </div>

              <div class="col-md-6">
                <label for="amount" class="form-label">Importo (€)</label>
                <input
                  type="number"
                  class="form-control"
                  id="amount"
                  placeholder="Es. 45.90"
                  min="0.01"
                  step="0.01"
                  required
                >
              </div>

              <div class="col-md-6">
                <label for="category" class="form-label">Categoria</label>
                <select id="category" class="form-select" required>
                  <option value="">Seleziona una categoria</option>
                  <option value="Casa">Casa</option>
                  <option value="Cibo">Cibo</option>
                  <option value="Trasporti">Trasporti</option>
                  <option value="Tempo libero">Tempo libero</option>
                  <option value="Salute">Salute</option>
                  <option value="Altro">Altro</option>
                </select>
              </div>

              <div class="col-md-6">
                <label for="date" class="form-label">Data</label>
                <input
                  type="date"
                  class="form-control"
                  id="date"
                  required
                >
              </div>
            </div>

            <div class="mt-4 d-flex gap-2">
              <button type="submit" class="btn btn-primary" id="submit-btn">
                Aggiungi spesa
              </button>
              <button type="reset" class="btn btn-outline-secondary">
                Svuota campi
              </button>
            </div>
          </form>

          <div id="form-message" class="mt-3"></div>
        </div>
      </div>
    </section>

    <!-- Sezione riepilogo -->
    <section class="mb-5">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="card text-center shadow-sm border-0 summary-card">
            <div class="card-body">
              <h2 class="h5">Totale spese</h2>
              <p id="total-expenses" class="display-6 fw-bold mb-0">€ 0.00</p>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card text-center shadow-sm border-0 summary-card">
            <div class="card-body">
              <h2 class="h5">Numero totale spese</h2>
              <p id="expenses-count" class="display-6 fw-bold mb-0">0</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Sezione filtri e ricerca -->
    <section class="mb-5">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h2 class="h4 mb-4">Filtri e ricerca</h2>

          <div class="row g-3">
            <div class="col-md-6">
              <label for="filter-category" class="form-label">Filtra per categoria</label>
              <select id="filter-category" class="form-select">
                <option value="Tutte">Tutte le categorie</option>
                <option value="Casa">Casa</option>
                <option value="Cibo">Cibo</option>
                <option value="Trasporti">Trasporti</option>
                <option value="Tempo libero">Tempo libero</option>
                <option value="Salute">Salute</option>
                <option value="Altro">Altro</option>
              </select>
            </div>

            <div class="col-md-6">
              <label for="search-description" class="form-label">Cerca per descrizione</label>
              <input
                type="text"
                id="search-description"
                class="form-control"
                placeholder="Scrivi una descrizione..."
              >
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Sezione lista spese -->
    <section>
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <h2 class="h4 mb-0">Lista delle spese</h2>
          </div>

          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th scope="col">Descrizione</th>
                  <th scope="col">Importo</th>
                  <th scope="col">Categoria</th>
                  <th scope="col">Data</th>
                  <th scope="col" class="text-center">Azioni</th>
                </tr>
              </thead>
              <tbody id="expenses-table-body">
                <tr id="empty-row">
                  <td colspan="5" class="text-center text-muted py-4">
                    Nessuna spesa registrata.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>

  <!-- JS personalizzato -->
  <script src="js/script.js"></script>
</body>
</html>
